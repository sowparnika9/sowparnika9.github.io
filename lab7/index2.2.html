    <body>
        <div id="map" style="width:100%; height: 650px"></div>
        <script>
            var basemap = L.tileLayer('https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryTopo/MapServer/tile/{z}/{y}/{x}', {
                        attribution: 'Tiles courtesy of the <a href="https://usgs.gov/">U.S. Geological Survey</a>',
                        subdomains: 'abcd',
                        minZoom: 0,
                        maxZoom: 20,
                        ext: 'png'
                    });
            var map = L.map('map', {
                center: [41.259944, -95.937057],
                zoom: 7,
                layers: [basemap]
            });

            var onEachFeature = function(feature, layer){
                if (feature.properties) {
                    var prop = feature.properties;
                    var popup = '<h3>'+prop['name']+'</h3>'+'<strong>Year: </strong>'+prop['time'];
                    feature.layer = layer;
                    layer.bindPopup(popup, {maxWidth: "auto"});
                }
            };

            var blueCircleMarkers = {
                radius: 4,
                fillColor: "#00AEEF",
                color: "#3978BF",
                weight: 1,
                opacity: 0.8,
                fillOpacity: 0.5
            };
            var orangeCircleMarkers = {
                radius: 5,
                fillColor: "#ED1C24",
                color: "#ED1C24",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.7
            };
            var greenCircleMarkers = {
                radius: 5,
                fillColor: "#ffff00",
                color: "#286933",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.7
            };

            var firstlayer = L.geoJson(brintonJson, {
                onEachFeature: onEachFeature,
                pointToLayer: function(feature, latlng) {
                    return L.circleMarker(latlng, blueCircleMarkers);
                }
            }).addTo(map);
            var timelineLayer = L.geoJson(brintonJson, {
            onEachFeature: onEachFeature,
            pointToLayer: function(feature, latlng) {
                return L.circleMarker(latlng, orangeCircleMarkers);
                }
            });
            timelineLayer.addTo(map);
// now make a timeline layer that the slider can manipulate
            var searchLayer = L.geoJson(brintonJson, {
            onEachFeature: onEachFeature,
            pointToLayer: function(feature, latlng) {
                return L.circleMarker(latlng, greenCircleMarkers);
                }
            });

            var sliderControl = L.control.sliderControl({
                position: "topright",
                layer: timelineLayer,
                range: true, // gives it a bottom and a top slider
                timeAttribute: "time"
            });

            map.addControl(sliderControl);
            sliderControl.startSlider(); // initialize

            var searchOptions = {
                position: 'topleft',
                title: 'Search',
                placeholder: 'Search location name',
                maxResultLength: 10,
                caseSensitive: false,
                showInvisibleFeatures: true,
                layerToToggle: searchLayer,
                threshold: 0.5, // default is .5, will match imperfect results
                showResultFct: function(feature, container) {
                    props = feature.properties;
                    var name = L.DomUtil.create('b', null, container);
                    name.innerHTML = props.name;
                    container.appendChild(L.DomUtil.create('br', null, container));

                }
            };

            var searchControl = L.control.fuseSearch(searchOptions);
            map.addControl(searchControl);
            searchControl.indexFeatures(brintonJson.features, ['name']);

            // displayFeatures(brintonJson, searchLayer);

                   // });

            };

        L.control.layers(overlays, baseMaps, {collapsed:false}).addTo(map);
